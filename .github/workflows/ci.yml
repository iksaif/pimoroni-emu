name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check emulator/ tests/ apps/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package
        run: pip install dist/*.whl && pimoroni-emulator --list-devices

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest tests/ -v

  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint, build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Smoke test - Tufty hello badge
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: timeout 30 python -m emulator --device tufty --headless --max-frames 3 apps/tufty/hello_badge.py

      - name: Smoke test - Badger hello badge
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: timeout 30 python -m emulator --device badger --headless --max-frames 3 apps/badger/hello_badge.py

      - name: Smoke test - Presto touch demo
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: timeout 30 python -m emulator --device presto --headless --max-frames 3 apps/presto/touch_demo.py

      - name: Smoke test - Inky Frame hello
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: timeout 30 python -m emulator --device inky_frame --headless --max-frames 3 apps/inky_frame/hello_inky.py

      - name: Smoke test - Blinky scrolling text
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: timeout 30 python -m emulator --device blinky --headless --max-frames 3 apps/blinky/scrolling_text.py
